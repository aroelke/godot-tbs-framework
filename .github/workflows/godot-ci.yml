name: "test"
on: push

permissions:
  contents: read
  checks: write

env:
  GODOT_VERSION: 4.5.1
  BUILD_DIR: build
  EXPORT_BIN: godot-tbs-framework.test
  LINUX_EXPORT: Linux (Test)
  WINDOWS_EXPORT: Windows Desktop (Test)

jobs:
  unit-test-linux:
    name: Run Unit Tests (Linux)
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:mono-4.5.1
    steps:
      - name: Get Packages
        run: |
          apt update
          apt install -y ssh
      - name: Checkout Framework
        uses: actions/checkout@v6
      - name: Checkout Tests
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.GODOT_TBS_TEMPLATE_ACTIONS }}
          repository: ${{ github.repository_owner }}/godot-tbs-framework-tests
          path: test
      - name: Copy Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mkdir -v -p ~/.config
          cp -R /root/.config/godot ~/.config/godot
          cp -R /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable.mono
      - name: Build
        run: |
          EXPORT_DIR="$(readlink -f ${BUILD_DIR})"
          godot --headless --build-solutions --quit
      - name: Linux Export
        run: |
          mkdir -v -p ${BUILD_DIR}/linux
          EXPORT_DIR="$(readlink -f ${BUILD_DIR})"
          godot --headless --export-debug "${LINUX_EXPORT}" "${EXPORT_DIR}/linux/${EXPORT_BIN}.x86_64"
      - name: Windows Export
        run: |
          mkdir -v -p ${BUILD_DIR}/windows
          EXPORT_DIR="$(readlink -f ${BUILD_DIR})"
          godot --headless --export-debug "${WINDOWS_EXPORT}" "${EXPORT_DIR}/windows/${EXPORT_BIN}.exe"
      - name: Run
        run: |
          EXPORT_DIR="$(readlink -f ${BUILD_DIR})"
          ${EXPORT_DIR}/linux/${EXPORT_BIN}.x86_64 --headless
      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v6
        if: success() || failure()
        with:
          report_paths: 'test/report.xml'